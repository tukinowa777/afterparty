<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#112944" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>二次会居酒屋ファインダー</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <p class="eyebrow">After Party Finder</p>
        <h1>二次会探すくん</h1>
        <h2 class="hero-subtitle">夜9時以降に入れる二次会向け居酒屋を、現在地から3件提案</h2>

        <div class="location-card">
          <div>
            <p class="location-label">検索の起点</p>
            <p class="location-value" id="locationLabel">現在地</p>
            <p class="location-detail" id="locationDetail">緯度 35.68950 / 経度 139.69170</p>
            <p class="location-note" id="locationNote">現在地を取得してから「探す」を押すとおすすめを表示します。</p>
          </div>
          <button id="locateButton" class="locate-button" type="button">現在地を使う</button>
        </div>

        <div class="hero-actions">
          <button id="searchButton" class="search-button" type="button">探す</button>
        </div>

        <section class="results results-in-hero">
          <div id="resultsHeader" class="results-header" hidden>
            <h2>おすすめ3件</h2>
            <p id="resultsMeta">3件ヒット</p>
          </div>
          <div id="resultsPager" class="results-pager" hidden>
            <button id="prevResultsButton" class="pager-button" type="button">前の3件</button>
            <button id="nextResultsButton" class="pager-button" type="button">次の3件</button>
          </div>
          <div id="loadingIndicator" class="loading-indicator" hidden aria-live="polite">
            <span class="loading-dot"></span>
            <span class="loading-dot"></span>
            <span class="loading-dot"></span>
            <span class="loading-text">検索中</span>
          </div>
          <p id="statusMessage" class="status-message" hidden></p>
          <p id="sourceNote" class="source-note" hidden></p>
          <div id="resultsList" class="results-list"></div>
        </section>

        <div class="mobile-guide">
          <p class="mobile-guide-title">スマホで使うときのポイント</p>
          <p class="mobile-guide-text">
            iPhone / Android では、位置情報を許可すると現在地検索が使えます。許可しない場合でも、駅を選んで周辺の店を探せます。
          </p>
        </div>
      </section>

      <section class="filters">
        <div class="filters-header">
          <h2>条件を設定</h2>
        </div>

        <div id="stationFields" class="station-fields">
          <label class="field">
            <span>路線</span>
            <select id="lineSelect"></select>
          </label>

          <label class="field">
            <span>駅</span>
            <select id="stationSelect"></select>
          </label>
        </div>

        <label class="field">
          <span>人数</span>
          <input id="partySize" type="number" min="1" value="4" />
        </label>

        <label class="field">
          <span>料理ジャンル</span>
          <select id="cuisine">
            <option value="any">なんでも</option>
            <option value="yakitori">焼き鳥</option>
            <option value="seafood">海鮮</option>
            <option value="japanese">和食</option>
            <option value="korean">韓国料理</option>
            <option value="creative">創作系</option>
            <option value="meat">肉系</option>
          </select>
        </label>

        <label class="field">
          <span>移動距離</span>
          <select id="distance">
            <option value="100" selected>100m以内</option>
            <option value="500">500m以内</option>
            <option value="1000">1km以内</option>
            <option value="5000">5km以内</option>
          </select>
        </label>

        <label class="toggle">
          <div>
            <span>夜9時以降も営業</span>
            <p>二次会向けに、21:00以降でも入れる店だけを残します。</p>
          </div>
          <input id="openAfter21" type="checkbox" checked />
        </label>

        <div class="filters-actions">
          <button id="searchButtonBottom" class="search-button" type="button">探す</button>
        </div>
      </section>

    </main>

    <script src="./app.js"></script>
  </body>
  </html>
